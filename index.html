<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Agent</title>
    <script>
      (function() {
        // Fix for "Cannot set property fetch of #<Window> which has only a getter"
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine fetch as writable", e);
        }

        // Fix for cross-origin frame access errors
        try {
          if (window.parent !== window) {
            // Mock window.parent and window.top to return safe versions
            const safeLocation = new Proxy(window.location, {
              get: (target, prop) => {
                try {
                  return window.parent.location[prop];
                } catch (e) {
                  return target[prop];
                }
              }
            });

            const safeFrame = new Proxy(window.parent, {
              get: (target, prop) => {
                if (prop === 'location') return safeLocation;
                if (prop === 'origin') {
                  try {
                    return target.origin;
                  } catch (e) {
                    return window.location.origin;
                  }
                }
                try {
                  const val = target[prop];
                  return typeof val === 'function' ? val.bind(target) : val;
                } catch (e) {
                  return undefined;
                }
              }
            });

            Object.defineProperty(window, 'parent', { get: () => safeFrame, configurable: true });
            Object.defineProperty(window, 'top', { get: () => safeFrame, configurable: true });
          }
        } catch (e) {
          console.warn("Could not mock parent/top", e);
        }

        // Global and process mocks
        window.global = window;
        window.process = {
          env: { NODE_ENV: 'development' },
          nextTick: (fn, ...args) => setTimeout(() => fn(...args), 0),
          browser: true,
          cwd: () => '/',
          version: 'v18.0.0',
          versions: { node: '18.0.0' },
          on: function() { return this; },
          once: function() { return this; },
          off: function() { return this; },
          emit: function() { return this; },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
