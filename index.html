<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Agent</title>
    <script>
      (function() {
        // Fix for "Cannot set property fetch of #<Window> which has only a getter"
        try {
          let _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: () => _fetch,
            set: (v) => { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine fetch as writable", e);
        }

        // Fix for cross-origin frame access errors
        try {
          // Global error handler for cross-origin access
          window.addEventListener('error', (event) => {
            if (event.message && (
                event.message.includes('Blocked a frame with origin') || 
                event.message.includes('cross-origin frame') ||
                event.message.includes('origin from Location')
            )) {
              console.warn('Caught and silenced cross-origin error:', event.message);
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);

          if (window.parent !== window) {
            const safeOrigin = (function() {
              try {
                // Try to get origin from current window
                if (window.location.origin && window.location.origin !== 'null') return window.location.origin;
                if (window.location.protocol && window.location.host && window.location.protocol !== 'null') {
                  return window.location.protocol + '//' + window.location.host;
                }
              } catch (e) {}
              
              // Fallback: parse from href
              try {
                const url = new URL(window.location.href);
                return url.origin;
              } catch (e) {}
              
              return window.location.href.split('/').slice(0, 3).join('/') || 'http://localhost:3000';
            })();

            const mockLocation = new Proxy(window.location, {
              get: (target, prop) => {
                if (prop === 'origin') return safeOrigin;
                if (prop === 'ancestorOrigins') return [safeOrigin];
                
                try {
                  const val = target[prop];
                  if (typeof val === 'function') return val.bind(target);
                  return val;
                } catch (e) {
                  // Fallback for blocked properties
                  if (prop === 'href') return window.location.href;
                  if (prop === 'protocol') return window.location.protocol;
                  if (prop === 'host') return window.location.host;
                  if (prop === 'hostname') return window.location.hostname;
                  return undefined;
                }
              },
              set: (target, prop, value) => {
                try {
                  target[prop] = value;
                  return true;
                } catch (e) {
                  return false;
                }
              }
            });

            const mockFrame = new Proxy({}, {
              get: (target, prop) => {
                if (prop === 'location') return mockLocation;
                if (prop === 'origin') return safeOrigin;
                if (prop === 'parent' || prop === 'top') return mockFrame;
                if (prop === 'window' || prop === 'self') return mockFrame;
                
                // Return safe values for common window properties
                if (prop === 'document') return undefined;
                if (prop === 'frames') return [];
                if (prop === 'length') return 0;
                
                // Mock common window methods to prevent crashes
                const noop = () => {};
                const methods = ['postMessage', 'addEventListener', 'removeEventListener', 'focus', 'blur', 'close'];
                if (methods.includes(prop)) return noop;

                // For anything else, try to return from current window if it makes sense
                try {
                  const val = window[prop];
                  if (typeof val === 'function') return val.bind(window);
                  return val;
                } catch (e) {
                  return undefined;
                }
              },
              set: (target, prop, value) => {
                if (prop === 'location') {
                  window.location.href = value;
                  return true;
                }
                return false;
              }
            });

            // Mock document.location and history
            try {
              Object.defineProperty(document, 'location', { get: () => mockLocation, configurable: true });
              
              const mockHistory = new Proxy(window.history, {
                get: (target, prop) => {
                  try {
                    const val = target[prop];
                    return typeof val === 'function' ? val.bind(target) : val;
                  } catch (e) {
                    return undefined;
                  }
                }
              });
              Object.defineProperty(window, 'history', { get: () => mockHistory, configurable: true });
            } catch (e) {}

            Object.defineProperty(window, 'parent', { get: () => mockFrame, configurable: true });
            Object.defineProperty(window, 'top', { get: () => mockFrame, configurable: true });
            
            // Also try to mock on self
            try {
              Object.defineProperty(self, 'parent', { get: () => mockFrame, configurable: true });
              Object.defineProperty(self, 'top', { get: () => mockFrame, configurable: true });
            } catch (e) {}

            // Mock document.domain and referrer
            try {
              Object.defineProperty(document, 'domain', {
                get: () => window.location.hostname,
                set: (v) => {},
                configurable: true
              });
              Object.defineProperty(document, 'referrer', {
                get: () => window.location.origin,
                configurable: true
              });
            } catch (e) {}
          }
        } catch (e) {
          console.warn("Could not mock parent/top", e);
        }

        // Global and process mocks
        window.global = window;
        window.process = {
          env: { NODE_ENV: 'development' },
          nextTick: (fn, ...args) => setTimeout(() => fn(...args), 0),
          browser: true,
          cwd: () => '/',
          version: 'v18.0.0',
          versions: { node: '18.0.0' },
          on: function() { return this; },
          once: function() { return this; },
          off: function() { return this; },
          emit: function() { return this; },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
