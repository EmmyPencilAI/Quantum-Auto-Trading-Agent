<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Agent</title>
    <script>
      (function() {
        // Fix for "Cannot set property fetch of #<Window> which has only a getter"
        try {
          let _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: () => _fetch,
            set: (v) => { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine fetch as writable", e);
        }

        // Fix for cross-origin frame access errors
        try {
          if (window.parent !== window) {
            const mockLocation = {
              href: window.location.href,
              origin: window.location.origin,
              protocol: window.location.protocol,
              host: window.location.host,
              hostname: window.location.hostname,
              port: window.location.port,
              pathname: window.location.pathname,
              search: window.location.search,
              hash: window.location.hash,
              assign: function() { window.location.assign.apply(window.location, arguments); },
              replace: function() { window.location.replace.apply(window.location, arguments); },
              reload: function() { window.location.reload.apply(window.location, arguments); },
              toString: function() { return window.location.toString(); }
            };

            // Make it look more like a real Location object
            try {
              Object.setPrototypeOf(mockLocation, Location.prototype);
            } catch (e) {}

            const mockFrame = new Proxy(window.parent, {
              get: (target, prop) => {
                if (prop === 'location') return mockLocation;
                if (prop === 'origin') return window.location.origin;
                if (prop === 'parent' || prop === 'top') return mockFrame;
                try {
                  const val = target[prop];
                  return typeof val === 'function' ? val.bind(target) : val;
                } catch (e) {
                  return undefined;
                }
              }
            });

            Object.defineProperty(window, 'parent', { get: () => mockFrame, configurable: true });
            Object.defineProperty(window, 'top', { get: () => mockFrame, configurable: true });
          }
        } catch (e) {
          console.warn("Could not mock parent/top", e);
        }

        // Global and process mocks
        window.global = window;
        window.process = {
          env: { NODE_ENV: 'development' },
          nextTick: (fn, ...args) => setTimeout(() => fn(...args), 0),
          browser: true,
          cwd: () => '/',
          version: 'v18.0.0',
          versions: { node: '18.0.0' },
          on: function() { return this; },
          once: function() { return this; },
          off: function() { return this; },
          emit: function() { return this; },
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
